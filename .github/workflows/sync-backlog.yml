name: Sync backlog

on:
  push:
    branches: [main]
    paths:
      - "docs/backlog.md"
      - "docs/resolved.md"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync docs/backlog.md and docs/resolved.md to Mission Control
        env:
          INGEST_API_KEY: ${{ secrets.INGEST_API_KEY }}
          API_URL: https://genkeilabs.dev
          ORG_SLUG: coding-lab
          PROJECT_SLUG: mission-control-cli
          BACKLOG_PATH: docs/backlog.md
          RESOLVED_PATH: docs/resolved.md
        run: |
          set -euo pipefail

          if [[ -z "${INGEST_API_KEY:-}" ]]; then
            echo "::error::INGEST_API_KEY secret is not set on this repository."
            exit 1
          fi
          if [[ ! -f "$BACKLOG_PATH" ]]; then
            echo "::error::Backlog file not found at $BACKLOG_PATH"
            exit 1
          fi

          if [[ -f "$RESOLVED_PATH" ]]; then
            payload=$(jq -n \
              --arg projectSlug "$PROJECT_SLUG" \
              --rawfile content "$BACKLOG_PATH" \
              --rawfile resolvedContent "$RESOLVED_PATH" \
              '{schemaVersion: "1.1", projectSlug: $projectSlug, content: $content, resolvedContent: $resolvedContent}')
          else
            echo "::notice::No resolved.md found at $RESOLVED_PATH; sending backlog only."
            payload=$(jq -n \
              --arg projectSlug "$PROJECT_SLUG" \
              --rawfile content "$BACKLOG_PATH" \
              '{schemaVersion: "1.1", projectSlug: $projectSlug, content: $content}')
          fi

          http_status=$(curl -sS -o response.json -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer $INGEST_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$payload" \
            "$API_URL/api/org/$ORG_SLUG/backlog/sync")

          echo "Response (HTTP $http_status):"
          jq . response.json || cat response.json

          if [[ "$http_status" -lt 200 || "$http_status" -ge 300 ]]; then
            echo "::error::Backlog sync failed with HTTP $http_status"
            exit 1
          fi
